services:
  app:
    image: aitodo:latest
    # Build args bake the NEXT_PUBLIC_* values into the bundle at build time.
    # CI builds the image with `docker buildx --build-arg ...` (see the GitHub
    # Actions workflow), so this section only matters for a manual
    # `docker compose build`. The `:-` defaults keep `docker compose up` quiet
    # when these aren't exported (e.g. in CI, where the image is prebuilt).
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}
    restart: unless-stopped
    ports:
      - "6001:3000"
    env_file: .env
    networks:
      - default
      - 1panel-network

networks:
  1panel-network:
    external: true
