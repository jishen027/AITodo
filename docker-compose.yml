services:
  app:
    image: aitodo:latest
    # Build args bake the NEXT_PUBLIC_* values into the bundle at build time.
    # Compose substitutes ${...} from the .env file in this directory, so keep
    # NEXT_PUBLIC_SITE_URL (and the others) in .env. Rebuild after changing them:
    #   docker compose build --no-cache && docker compose up -d
    build:
      context: .
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION}
    restart: unless-stopped
    ports:
      - "6001:3000"
    env_file: .env
    networks:
      - default
      - 1panel-network

networks:
  1panel-network:
    external: true
